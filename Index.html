<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CICERO Halal Roma</title>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- LEAFLET -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
body{margin:0;font-family:sans-serif;background:#f7f6f2;color:#1a1a18}
header{padding:16px;font-weight:800;font-size:20px; display: flex; align-items: center;} /* Aggiunto display flex per allineare logo e testo */
#map{height:300px;margin:16px;border-radius:12px}
.card{background:white;margin:10px 16px;padding:12px;border-radius:10px;border:1px solid #ddd}
.badge{font-size:11px;padding:3px 8px;border-radius:999px}
.reliable{background:#00c853;color:white}
.declared{background:#ffd600}
.unknown{background:#ccc}

/* Stili specifici per il logo nell'header */
header svg {
    height: 24px; /* Regola l'altezza desiderata */
    width: auto;
    margin-right: 12px; /* Spazio tra logo e testo */
}
</style>
</head>

<body>

<header>
    <!-- COPIA E INCOLLA QUI IL CODICE SVG REALE DEL TUO LOGO SCELTO -->
    <!-- Questo è un SVG di esempio finto che emula il logo scelto! -->
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="11" stroke="#1A1A18" stroke-width="2"/>
        <path d="M12 21C7.02944 21 3 16.9706 3 12C3 7.02944 7.02944 3 12 3" stroke="#1A1A18" stroke-width="2"/>
        <path d="M12 12C12 9.79086 13.7909 8 16 8C18.2091 8 20 9.79086 20 12C20 14.2091 18.2091 16 16 16C13.7909 16 12 14.2091 12 12Z" fill="#1A1A18"/>
        <path d="M16.5 12L15.32 12.83L15.68 14.2L14.5 13.37L13.32 14.2L13.68 12.83L12.5 12L13.88 11.96L14.5 10.6L15.12 11.96L16.5 12Z" fill="white"/>
    </svg>
  
  CICERO Halal Roma
</header>

<div id="map"></div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://fmaildvceklzfulgzujt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZtYWlsZHZjZWtsemZ1bGd6dWp0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NDY0NTQsImV4cCI6MjA5MzIyMjQ1NH0.X7vc5gZFSfwsJVE-h3rMp5FBNLlFpB-reGCx0PjXBh8";

let supabaseClient = null;
let places = [];
let map;
let markers = [];

function normalizePlace(p){
  return {
    id: p.id,
    name: p.name,
    address: p.address,
    category: p.category || "ristorante",
    cuisine: p.cuisine || "",
    price: p.price || "€",
    alcohol: p.alcohol || false,
    status: p.halal_status || "unknown",
    source: p.source || "",
    rating: p.rating || 0,
    reviews: p.reviews || 0,
    lat: p.lat,
    lng: p.lng,
    emoji: p.emoji || "📍",
    nm: p.near_mosque || false
  };
}

async function init(){
  supabaseClient = window.supabase.createClient(
    SUPABASE_URL,
    SUPABASE_ANON_KEY
  );

  await loadData();
  initMap();
  render();
}

async function loadData(){
  const {data, error} = await supabaseClient
    .from("places")
    .select("*")
    .order("created_at",{ascending:false});

  if(!error && data){
    places = data.map(normalizePlace);
  } else {
    console.log("Errore DB");
  }
}

function initMap(){
  map = L.map('map').setView([41.9028,12.4964],12);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© OpenStreetMap'
  }).addTo(map);

  renderMarkers();
}

function renderMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers = [];

  places.forEach(p=>{
    if(!p.lat || !p.lng) return;

    const marker = L.marker([p.lat,p.lng]).addTo(map);
    marker.on("click",()=>alert(p.name));
    markers.push(marker);
  });
}

function render(){
  const list = document.getElementById("list");

  list.innerHTML = places.map(p=>{
    return `
      <div class="card">
        <b>${p.name}</b><br>
        ${p.category} · ${p.cuisine}<br>
        <span class="badge ${p.status}">
          ${p.status}
        </span>
      </div>
    `;
  }).join("");
}

init();
</script>

</body>
</html>
